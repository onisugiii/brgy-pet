<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BRGY-PET · Owners</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header"><div class="sidebar-logo">🐾</div><div><div class="sidebar-brand-name">BRGY-PET</div><div class="sidebar-brand-sub">Animal Tracking &amp; Reg.</div></div></div>
    <div class="nav-section-label">Operations</div>
    <a class="nav-item" href="dashboard.html"><span class="nav-icon"></span> Dashboard</a>
    <a class="nav-item" href="registry.html"><span class="nav-icon"></span> Animal Registry</a>
    <a class="nav-item" href="owners.html"><span class="nav-icon"></span> Owners</a>
    <a class="nav-item" href="vaccinations.html"><span class="nav-icon"></span> Vaccinations</a>
    <a class="nav-item" href="lost-found.html"><span class="nav-icon"></span> Lost &amp; Found</a>
    <a class="nav-item" href="adoption.html"><span class="nav-icon"></span> Adoption</a>
    <div class="nav-section-label">Admin</div>
    <a class="nav-item" href="users.html"><span class="nav-icon"></span> User Management</a>
    <div class="sidebar-footer"><div class="sidebar-footer-label">Active Coverage</div><div class="user-row">
        <div class="user-row-main">
          <div class="user-avatar" id="sidebar-avatar">BA</div>
          <div class="user-info">
            <div class="user-name" id="sidebar-user-name">Barangay Admin</div>
            <div class="user-email" id="sidebar-user-email">admin@barangay.gov...</div>
          </div>
        </div>
        <button class="logout-btn" id="logout-btn" title="Sign out">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sign out
        </button>
      </div></div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div class="topbar-info"><div class="topbar-title">Owners</div><div class="topbar-sub">Registered pet owners in the barangay.</div></div>
      <div class="topbar-actions"><button class="btn-primary" id="open-owner-modal">+ Add Owner</button></div>
    </div>
    <div class="content page-animate">

      <!-- Search bar standalone -->
      <div class="search-wrap" style="margin-bottom: 12px;">
        <span class="search-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </span>
        <input class="search-input" id="search-input" type="text" placeholder="Search by name, address…"/>
      </div>

      <!-- Table card -->
      <div class="card">
        <div class="card-body">
          <div class="table-wrap">
            <table class="table">
              <thead><tr><th>Name</th><th>Contact</th><th>Address</th><th>Pets</th><th>Actions</th></tr></thead>
              <tbody id="owners-body"><tr><td colspan="5"><div class="empty-state"><div class="empty-icon">👤</div><p>Loading...</p></div></td></tr></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<div class="modal-overlay" id="owner-modal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title" id="owner-modal-title">Add Owner</div><button class="modal-close" id="close-owner-modal">✕</button></div>
    <form id="owner-form-el">
      <input type="hidden" id="o-edit-id"/>
      <div class="modal-body">
        <div class="form-group"><label>Full Name *</label><input type="text" id="o-name" placeholder="e.g. Juan Dela Cruz"/></div>
        <div class="form-group"><label>Contact Number</label><input type="text" id="o-contact" placeholder="e.g. 09171234567"/></div>
        <div class="form-group"><label>Address</label><input type="text" id="o-address" placeholder="e.g. Purok 1, Barangay Poblacion"/></div>
        <div class="form-group"><label>Barangay</label><input type="text" id="o-barangay" placeholder="e.g. San Bartolome"/></div>
        <div class="form-group"><label>Email</label><input type="email" id="o-email" placeholder="e.g. juan@email.com"/></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-outline" id="cancel-owner-btn">Cancel</button>
        <button type="button" class="btn-primary" id="save-owner">Save Owner</button>
      </div>
    </form>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/icons.js"></script>
<script src="js/nav.js"></script>
<script src="js/owners.js"></script>
</body>
</html>
